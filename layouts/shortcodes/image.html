{{ $imgname := .Get "src" }}
{{ $title := .Get "title" }}
{{ $caption := .Get "caption" }}
{{ $alttext := .Get "alt" }}
{{ $width := .Get "width" }}
{{ $height := .Get "height" }}
{{ $img := $.Page.Resources.GetMatch $imgname }}
<figure>
	<img src="{{ $img.Permalink }}" alt="{{ $alttext }}" width="{{ $width }}" height="{{ $height }}"/>
	<figcaption>
		{{ with $title }}<h4>{{ $title }}</h4>{{ end }}
		<p>{{ $caption }}<p>
	</figcaption>
</figure>
